site_name: PyGraphina Documentation
site_description: Documentation for the PyGraphina library.
repo_url: https://github.com/habedi/graphina
repo_name: habedi/graphina
site_url: https://habedi.github.io/graphina/python/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - content.code.select
    - content.code.annotate
    - navigation.tracking
    - navigation.sections

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/habedi/graphina

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Basic Concepts: getting-started/concepts.md
  - API Reference:
      - Core:
          - Graph: api/graph.md
          - Directed Graph: api/digraph.md
          - Graph Views: api/core/views.md
          - Building Graphs: api/core/builders.md
          - Graph I/O: api/core/io.md
          - Interoperability: api/core/interop.md
          - Graph Generators: api/core/generators.md
          - Paths: api/core/paths.md
      - Extensions:
          - Centrality:
              - Overview: api/centrality/index.md
              - Degree: api/centrality/degree.md
              - Betweenness: api/centrality/betweenness.md
              - Closeness: api/centrality/closeness.md
              - Eigenvector: api/centrality/eigenvector.md
              - PageRank: api/centrality/pagerank.md
              - Katz: api/centrality/katz.md
              - Harmonic: api/centrality/harmonic.md
              - Reaching: api/centrality/reaching.md
          - Community Detection:
              - Overview: api/community/index.md
              - Label Propagation: api/community/label_propagation.md
              - Louvain: api/community/louvain.md
              - Girvan-Newman: api/community/girvan_newman.md
              - Spectral Clustering: api/community/spectral.md
              - Connected Components: api/community/connected_components.md
          - Link Prediction:
              - Overview: api/links/index.md
              - Similarity Metrics: api/links/similarity.md
              - Resource Allocation: api/links/allocation.md
              - Preferential Attachment: api/links/attachment.md
              - Centrality-based: api/links/centrality.md
          - Approximation Algorithms:
              - Overview: api/approximation/index.md
              - Clique: api/approximation/clique.md
              - Clustering: api/approximation/clustering.md
              - Connectivity: api/approximation/connectivity.md
              - Independent Set: api/approximation/independent_set.md
              - Vertex Cover: api/approximation/vertex_cover.md
              - Treewidth: api/approximation/treewidth.md
              - Subgraph: api/approximation/subgraph.md
              - Ramsey: api/approximation/ramsey.md
          - Metrics:
              - Graph Metrics: api/metrics/graph.md
              - Node Metrics: api/metrics/node.md
          - MST: api/mst/index.md
          - Traversal:
              - Overview: api/traversal/index.md
              - BFS and DFS: api/traversal/basic.md
          - Subgraphs: api/subgraphs/index.md
          - Parallel: api/parallel/index.md

  - Examples:
      - Basic Usage: examples/basic.md
      - Centrality Analysis: examples/centrality.md
      - Community Detection: examples/community.md
      - Link Prediction: examples/links.md
      - Graph Algorithms: examples/algorithms.md
  - Contributing: contributing.md

extra_javascript:
  - assets/js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - attr_list
  - toc:
      permalink: true
