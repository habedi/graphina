# Configuration for cargo-deny (https://embarkstudios.github.io/cargo-deny/).
# Run with `make deny`.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `bincode` has no maintained upstream replacement with a drop-in upgrade path yet.
    "RUSTSEC-2025-0141",
    # `paste` is a transitive dependency from nalgebra/simba with no safe upstream upgrade path yet.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Graphina is MIT OR Apache-2.0; keep the dependency tree permissively licensed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
