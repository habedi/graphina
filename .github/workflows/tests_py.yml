name: Run Python Tests

on:
  workflow_dispatch:
  schedule: # Run every night at midnight (UTC)
    - cron: '0 0 * * *'
  pull_request:
    branches:
      - main
    paths:
      - 'pygraphina/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - '.github/workflows/tests_py.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'pygraphina/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - '.github/workflows/tests_py.yml'
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-py:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libssl-dev libfontconfig1-dev make

      - name: Run Python tests and generate coverage report
        run: |
          pip install uv
          uv sync --extra dev
          source .venv/bin/activate
          uv pip install maturin
          make test-py

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: pygraphina
        continue-on-error: true
