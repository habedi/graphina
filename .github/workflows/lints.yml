name: Run Linter Checks

on:
  workflow_dispatch:
  schedule: # Run every night at midnight (UTC)
    - cron: '0 0 * * *'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'pygraphina/**'
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.85.0' # Pinned to project's MSRV
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang curl pkg-config libssl-dev make
          make install-deps

      - name: Check formatting
        run: make format-check

      - name: Check module dependencies
        run: make check-module-deps

      - name: Run linters
        run: make lint
