site_name: Graphina Documentation
site_description: Documentation for the Graphina Rust library
repo_url: https://github.com/habedi/graphina
repo_name: habedi/graphina
site_url: https://habedi.github.io/graphina/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - content.code.select
    - content.code.annotate
    - navigation.tracking
    - navigation.sections

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/habedi/graphina

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Core Concepts: getting-started/concepts.md
  - User Guide:
      - Core:
          - Graph Types: guide/graphs.md
          - Building Graphs: guide/builders.md
          - Graph Generators: guide/generators.md
          - Graph I/O: guide/io.md
          - Graph Validation: guide/validation.md
      - Extensions:
          - Traversal: guide/traversal.md
          - Subgraphs and Views: guide/subgraphs.md
          - Centrality: guide/centrality.md
          - Community Detection: guide/community.md
          - Path Finding: guide/paths.md
          - Minimum Spanning Tree: guide/mst.md
          - Link Prediction: guide/links.md
          - Approximation: guide/approximation.md
          - Graph Metrics: guide/metrics.md
          - Parallel Processing: guide/parallel.md
  - Examples:
      - Basic: examples/basic.md
      - Generators: examples/generators.md
      - I/O: examples/io.md
      - Graph Validation: examples/validation.md
      - Centrality: examples/centrality.md
      - Community Detection: examples/community.md
      - Link Prediction: examples/links.md
      - Approximation: examples/approximation.md
      - Graph Metrics: examples/metrics.md
      - Minimum Spanning Tree: examples/mst.md
      - Parallel Processing: examples/parallel.md
      - Path Finding: examples/paths.md
      - Subgraphs and Views: examples/subgraphs.md
      - Traversal: examples/traversal.md
  - API Reference:
      - Rust Docs (docs.rs): https://docs.rs/graphina
      - Crate (crates.io): https://crates.io/crates/graphina

extra_javascript:
  - assets/js/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - attr_list
  - toc:
      permalink: true
